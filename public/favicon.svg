<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="GuiaSat">
  <!-- navy tile so the mark reads in both light and dark browser chrome -->
  <rect width="32" height="32" rx="7" fill="#0E1E33"/>
  <!-- orbital guidance arc -->
  <path d="M4.5 21.5 A 13 9 -22 1 1 26 11.5" fill="none" stroke="#E3A132" stroke-width="1.8" stroke-linecap="round"/>
  <!-- CubeSat: solar panels (gold) + body (cream) -->
  <g>
    <rect x="3.6" y="12.8" width="5" height="6.4" rx="0.8" fill="#E3A132"/>
    <rect x="23.4" y="12.8" width="5" height="6.4" rx="0.8" fill="#E3A132"/>
    <line x1="8.6" y1="16" x2="11.5" y2="16" stroke="#E3A132" stroke-width="1.4"/>
    <line x1="20.5" y1="16" x2="23.4" y2="16" stroke="#E3A132" stroke-width="1.4"/>
    <rect x="11.5" y="11.5" width="9" height="9" rx="1.4" fill="#F4EFE6"/>
    <rect x="13.7" y="13.7" width="4.6" height="4.6" rx="0.8" fill="#0E1E33"/>
  </g>
  <!-- signal / fix point on the orbit -->
  <circle cx="26" cy="11.5" r="2.4" fill="#F4EFE6"/>
  <circle cx="26" cy="11.5" r="1.1" fill="#E3A132"/>
</svg>
